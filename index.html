<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة القنوات</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f2f5; }
    .btn { background: #0088cc; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin: 5px; }
    .channel { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; }
    #post-form, #add-form { display: none; background: white; padding: 20px; margin-top: 20px; border-radius: 10px; }
  </style>
</head>
<body>
  <h2>قنواتي</h2>
  <div id="channels"></div>
  <button class="btn" onclick="document.getElementById('add-form').style.display='block'">➕ إضافة قناة</button>

  <div id="add-form">
    <h3>إضافة قناة</h3>
    <input id="new-channel" placeholder="@username">
    <button class="btn" onclick="addChannel()">إضافة</button>
    <button class="btn" onclick="document.getElementById('add-form').style.display='none'">إلغاء</button>
  </div>

  <div id="post-form">
    <h3>نشر في: <span id="selected-channel"></span></h3>
    <textarea id="post-text" placeholder="نص المنشور"></textarea>
    <input id="btn-name" placeholder="اسم الزر">
    <input id="btn-url" placeholder="رابط الزر">
    <input id="btn-icon" placeholder="إيموجي (اختياري)">
    <button class="btn" onclick="publish()">📤 نشر</button>
    <button class="btn" onclick="document.getElementById('post-form').style.display='none'">إلغاء</button>
  </div>

  <script>
    const API = 'https://mu-bot-backend.izubex.workers.dev'; // ⚠️ غيّر إلى رابطك
    let selectedChat = null;

    async function load() {
      const res = await fetch(API + '/channels');
      const channels = await res.json();
      document.getElementById('channels').innerHTML = channels.map(ch => 
        `<div class="channel" onclick="select(${ch.chat_id},'${ch.title}')"><strong>${ch.title}</strong> (@${ch.username})</div>`
      ).join('');
    }

    function select(chatId, title) {
      selectedChat = chatId;
      document.getElementById('selected-channel').innerText = title;
      document.getElementById('post-form').style.display = 'block';
    }

    async function addChannel() {
      const username = document.getElementById('new-channel').value.trim();
      if (!username) return alert('أدخل معرف القناة');
      const res = await fetch(API + '/add_channel', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username})
      });
      const data = await res.json();
      alert(data.message || data.error);
      if (res.ok) { load(); document.getElementById('add-form').style.display='none'; }
    }

    async function publish() {
      const text = document.getElementById('post-text').value.trim();
      const btn_name = document.getElementById('btn-name').value.trim();
      const btn_url = document.getElementById('btn-url').value.trim();
      const btn_icon = document.getElementById('btn-icon').value.trim();
      if (!text || !btn_name || !btn_url) return alert('الحقول مطلوبة');
      const res = await fetch(API + '/publish', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({chat_id: selectedChat, text, btn_name, btn_url, btn_icon})
      });
      const data = await res.json();
      alert(data.message || data.error);
      if (res.ok) document.getElementById('post-form').style.display='none';
    }

    load();
  </script>
</body>
</html>
