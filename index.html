<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة القنوات</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
    .btn { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    .btn-secondary { background: #ccc; color: #333; }
    .channel-item { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    .form-box { background: white; padding: 20px; margin-top: 20px; border-radius: 10px; display: none; }
    .message { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
    .error { background: #fce4e4; color: #c00; }
    .success { background: #e6f9f0; color: #0a0; }
  </style>
</head>
<body>
  <h2>قنواتي</h2>
  <div id="channel-container"></div>
  <button class="btn" id="show-add-form">➕ إضافة قناة</button>

  <!-- نموذج إضافة قناة -->
  <div id="add-channel-form" class="form-box">
    <h3>إضافة قناة</h3>
    <input type="text" id="new-channel" placeholder="@username">
    <div>
      <button class="btn" id="add-channel-btn">إضافة</button>
      <button class="btn btn-secondary" id="cancel-add">إلغاء</button>
    </div>
    <div id="add-message" class="message"></div>
  </div>

  <!-- نموذج نشر منشور -->
  <div id="post-form" class="form-box">
    <h3>نشر في: <span id="selected-channel-name"></span></h3>
    <textarea id="post-text" placeholder="نص المنشور"></textarea>
    <input type="text" id="btn-name" placeholder="اسم الزر">
    <input type="text" id="btn-url" placeholder="رابط الزر">
    <input type="text" id="btn-icon" placeholder="إيموجي (اختياري)">
    <div>
      <button class="btn" id="publish-btn">📤 نشر</button>
      <button class="btn btn-secondary" id="cancel-publish">إلغاء</button>
    </div>
    <div id="publish-message" class="message"></div>
  </div>

  <script>
    // ⚠️ استبدل هذا الرابط برابط الـ Worker الخاص بك
    const API_BASE = 'https://mu-bot-backend.izubex.workers.dev'; 
    let selectedChatId = null;

    // عناصر الواجهة
    const channelContainer = document.getElementById('channel-container');
    const addForm = document.getElementById('add-channel-form');
    const postForm = document.getElementById('post-form');
    const addMessage = document.getElementById('add-message');
    const publishMessage = document.getElementById('publish-message');

    // ---- دوال عرض/إخفاء الرسائل ----
    function showMessage(el, msg, isError = false) {
      el.textContent = msg;
      el.className = 'message ' + (isError ? 'error' : 'success');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    // ---- تحميل القنوات ----
    async function loadChannels() {
      try {
        const res = await fetch(API_BASE + '/channels');
        if (!res.ok) throw new Error('خطأ ' + res.status);
        const channels = await res.json();
        channelContainer.innerHTML = '';
        if (channels.length === 0) {
          channelContainer.innerHTML = '<p>لا توجد قنوات مضافة.</p>';
          return;
        }
        channels.forEach(ch => {
          const div = document.createElement('div');
          div.className = 'channel-item';
          div.innerHTML = `<strong>${ch.title}</strong> (@${ch.username})`;
          div.addEventListener('click', () => selectChannel(ch));
          channelContainer.appendChild(div);
        });
      } catch (e) {
        channelContainer.innerHTML = '<p style="color:red">فشل تحميل القنوات: ' + e.message + '</p>';
      }
    }

    function selectChannel(ch) {
      selectedChatId = ch.chat_id;
      document.getElementById('selected-channel-name').textContent = ch.title;
      postForm.style.display = 'block';
      addForm.style.display = 'none';
    }

    // ---- إضافة قناة ----
    async function addChannel() {
      const username = document.getElementById('new-channel').value.trim();
      if (!username) {
        showMessage(addMessage, 'أدخل معرف القناة', true);
        return;
      }
      try {
        const res = await fetch(API_BASE + '/add_channel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'فشلت الإضافة');
        showMessage(addMessage, data.message, false);
        document.getElementById('new-channel').value = '';
        addForm.style.display = 'none';
        loadChannels();
      } catch (e) {
        showMessage(addMessage, e.message, true);
      }
    }

    // ---- نشر منشور ----
    async function publishPost() {
      const text = document.getElementById('post-text').value.trim();
      const btn_name = document.getElementById('btn-name').value.trim();
      const btn_url = document.getElementById('btn-url').value.trim();
      const btn_icon = document.getElementById('btn-icon').value.trim();

      if (!text || !btn_name || !btn_url) {
        showMessage(publishMessage, 'جميع الحقول مطلوبة', true);
        return;
      }
      try {
        const res = await fetch(API_BASE + '/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: selectedChatId, text, btn_name, btn_url, btn_icon })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'فشل النشر');
        showMessage(publishMessage, data.message, false);
        document.getElementById('post-text').value = '';
        document.getElementById('btn-name').value = '';
        document.getElementById('btn-url').value = '';
        document.getElementById('btn-icon').value = '';
        postForm.style.display = 'none';
      } catch (e) {
        showMessage(publishMessage, e.message, true);
      }
    }

    // ---- ربط الأحداث (Event Listeners) ----
    document.getElementById('show-add-form').addEventListener('click', () => {
      addForm.style.display = 'block';
      postForm.style.display = 'none';
    });

    document.getElementById('cancel-add').addEventListener('click', () => {
      addForm.style.display = 'none';
    });

    document.getElementById('add-channel-btn').addEventListener('click', addChannel);

    document.getElementById('cancel-publish').addEventListener('click', () => {
      postForm.style.display = 'none';
    });

    document.getElementById('publish-btn').addEventListener('click', publishPost);

    // التحميل الأول
    loadChannels();
  </script>
</body>
</html>
