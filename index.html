<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>لوحة النشر المتكاملة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --primary: #0088cc;
      --danger: #e74c3c;
      --success: #27ae60;
      --purple: #764ba2;
    }
    .dark {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header h2 { font-size: 1.8em; color: var(--primary); }
    .tabs {
      display: flex;
      background: var(--card);
      border-radius: 15px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      border-radius: 12px;
      font-weight: bold;
      color: #888;
      transition: 0.3s;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      margin: 5px 0;
      text-align: center;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-purple { background: var(--purple); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1em;
      background: var(--card);
      color: var(--text);
    }
    .channel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: var(--card);
      border-radius: 10px;
      margin: 5px 0;
    }
    .btn-item {
      background: var(--bg);
      padding: 10px;
      border-radius: 8px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .color-dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: inline-block; cursor: pointer; border: 3px solid transparent; margin: 0 4px;
    }
    .color-dot.selected { border-color: #333; }
    .icon-option {
      display: inline-block; padding: 8px; font-size: 1.5em; cursor: pointer; border-radius: 8px;
    }
    .icon-option.selected { background: #ddd; }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--success); color: white; padding: 10px 25px; border-radius: 20px;
      z-index: 100; display: none;
    }
    .toast.error { background: var(--danger); }
    .media-preview { max-width: 100%; max-height: 150px; border-radius: 10px; margin: 5px; }
    .toolbar button {
      padding: 8px 12px; margin: 2px; border: none; border-radius: 6px; background: var(--bg); cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🚀 لوحة النشر</h2>
    <button id="dark-toggle" class="btn-outline" style="width:auto; padding:8px 15px;">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="channels">📢 القنوات</div>
    <div class="tab" data-tab="compose">✍️ إنشاء</div>
  </div>

  <!-- تبويب القنوات -->
  <div id="panel-channels" class="panel active">
    <div id="channel-list"></div>
    <input type="text" id="new-channel" placeholder="معرف القناة @username">
    <button class="btn btn-success" id="add-channel-btn"><i class="fa-solid fa-plus"></i> إضافة قناة</button>
  </div>

  <!-- تبويب الإنشاء -->
  <div id="panel-compose" class="panel">
    <div class="toolbar">
      <button onclick="format('bold')"><b>B</b></button>
      <button onclick="format('italic')"><i>I</i></button>
      <button onclick="format('createLink')"><i class="fa-solid fa-link"></i></button>
    </div>
    <div id="editor" class="card" contenteditable="true" style="min-height:100px;"></div>
    <style>.editor-content:empty::before { content: "اكتب المنشور هنا..."; color: #999; }</style>

    <div class="card">
      <h4>📎 الوسائط</h4>
      <div id="media-previews" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
      <label class="btn btn-outline">
        <i class="fa-solid fa-plus"></i> إضافة وسائط
        <input type="file" id="media-input" multiple accept="image/*,video/*" hidden>
      </label>
    </div>

    <div class="card">
      <h4>🔘 الأزرار</h4>
      <div id="buttons-container"></div>
      <button class="btn btn-purple" id="add-button-btn">+ إضافة زر</button>
    </div>

    <div id="button-form" class="card" style="display:none;">
      <input type="text" id="btn-text" placeholder="نص الزر">
      <input type="text" id="btn-url" placeholder="رابط الزر">
      <div>اللون:
        <span class="color-dot selected" data-color="#0088cc" style="background:#0088cc;"></span>
        <span class="color-dot" data-color="#e74c3c" style="background:#e74c3c;"></span>
        <span class="color-dot" data-color="#27ae60" style="background:#27ae60;"></span>
        <span class="color-dot" data-color="#f39c12" style="background:#f39c12;"></span>
      </div>
      <div>الأيقونة:
        <span class="icon-option selected" data-icon="📤">📤</span>
        <span class="icon-option" data-icon="🔗">🔗</span>
        <span class="icon-option" data-icon="⬇️">⬇️</span>
        <span class="icon-option" data-icon="▶️">▶️</span>
        <span class="icon-option" data-icon="⭐">⭐</span>
        <span class="icon-option" data-icon="❤️">❤️</span>
        <span class="icon-option" data-icon="🌐">🌐</span>
      </div>
      <button class="btn btn-purple" id="save-button-btn">حفظ الزر</button>
      <button class="btn btn-danger" id="cancel-button-btn">إلغاء</button>
    </div>

    <!-- معاينة -->
    <div class="card">
      <h4>👁️ معاينة</h4>
      <div id="preview-text"></div>
      <div id="preview-buttons" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
    </div>

    <div class="card">
      <h4>📤 النشر</h4>
      <select id="channel-select"><option value="">-- اختر قناة --</option></select>
      <button class="btn btn-success" id="publish-btn"><i class="fa-solid fa-paper-plane"></i> نشر الآن</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (() => {
      const TOKEN = '8991560932:AAEQUMZkOAdx7mj0fb41A5e4S0sEvnCdrE4'; // ⚠️ توكن مؤقت
      const API = 'https://api.telegram.org/bot' + TOKEN;
      const CH_KEY = 'my_channels';

      function toast(msg, ok=true) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (ok ? '' : ' error');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
      }
      function getChannels() { return JSON.parse(localStorage.getItem(CH_KEY) || '[]'); }
      function saveChannels(chs) { localStorage.setItem(CH_KEY, JSON.stringify(chs)); }

      // تبويبات
      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          t.classList.add('active');
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.getElementById('panel-' + t.dataset.tab).classList.add('active');
          if (t.dataset.tab === 'compose') updateSelect();
        });
      });

      // قنوات
      function renderChannels() {
        const chs = getChannels();
        const c = document.getElementById('channel-list');
        if (!chs.length) c.innerHTML = '<p style="color:#888;">لا قنوات</p>';
        else c.innerHTML = chs.map((ch,i) => `<div class="channel-row"><span>📢 ${ch.title} (@${ch.username})</span><button class="btn-danger" style="width:auto;padding:5px 10px;" data-del="${i}">🗑️</button></div>`).join('');
        document.querySelectorAll('[data-del]').forEach(b => b.onclick = function() {
          const idx = +this.dataset.del;
          const chs = getChannels();
          chs.splice(idx,1);
          saveChannels(chs);
          renderChannels();
          updateSelect();
        });
      }
      document.getElementById('add-channel-btn').onclick = async () => {
        const u = document.getElementById('new-channel').value.trim().replace('@','');
        if (!u) return toast('أدخل معرف القناة', false);
        const res = await fetch(API + '/getChat?chat_id=@' + u);
        const d = await res.json();
        if (!d.ok) return toast('تأكد أن البوت مشرف', false);
        const chs = getChannels();
        if (chs.some(c=>c.chat_id===d.result.id)) return toast('مضافة مسبقاً', false);
        chs.push({chat_id: d.result.id, title: d.result.title||u, username: u});
        saveChannels(chs);
        renderChannels();
        updateSelect();
        document.getElementById('new-channel').value='';
        toast('تمت الإضافة');
      };
      function updateSelect() {
        const sel = document.getElementById('channel-select');
        sel.innerHTML = '<option value="">-- اختر قناة --</option>';
        getChannels().forEach(ch => sel.innerHTML += `<option value="${ch.chat_id}">${ch.title} (@${ch.username})</option>`);
      }

      // محرر
      window.format = (cmd) => {
        if (cmd === 'createLink') {
          const url = prompt('الرابط:');
          if (url) document.execCommand(cmd, false, url);
        } else document.execCommand(cmd, false, null);
        document.getElementById('editor').focus();
        updatePreview();
      };
      document.getElementById('editor').addEventListener('input', updatePreview);

      // وسائط
      let mediaFiles = [];
      document.getElementById('media-input').onchange = function() {
        Array.from(this.files).forEach(file => {
          mediaFiles.push(file);
          const reader = new FileReader();
          reader.onload = e => {
            const card = document.createElement('div');
            card.style.position = 'relative';
            card.style.display = 'inline-block';
            if (file.type.startsWith('image')) {
              card.innerHTML = `<img src="${e.target.result}" class="media-preview"><button class="btn-danger" style="position:absolute;top:0;right:0;width:auto;padding:2px 6px;">×</button>`;
            } else {
              card.innerHTML = `<video src="${e.target.result}" class="media-preview" controls></video><button class="btn-danger" style="position:absolute;top:0;right:0;width:auto;padding:2px 6px;">×</button>`;
            }
            card.querySelector('button').onclick = () => {
              mediaFiles = mediaFiles.filter(f => f !== file);
              card.remove();
            };
            document.getElementById('media-previews').appendChild(card);
          };
          reader.readAsDataURL(file);
        });
        this.value = '';
      };

      // أزرار
      let buttons = [];
      let selColor = '#0088cc';
      let selIcon = '📤';
      function renderButtons() {
        const c = document.getElementById('buttons-container');
        c.innerHTML = buttons.map((b,i) => `<div class="btn-item"><span>${b.icon} ${b.text}</span><button class="btn-danger" style="width:auto;padding:5px;" data-rm="${i}">🗑️</button></div>`).join('');
        document.querySelectorAll('[data-rm]').forEach(b => b.onclick = function() {
          buttons.splice(+this.dataset.rm,1);
          renderButtons();
          updatePreview();
        });
        updatePreview();
      }
      document.getElementById('add-button-btn').onclick = () => document.getElementById('button-form').style.display = 'block';
      document.getElementById('cancel-button-btn').onclick = () => document.getElementById('button-form').style.display = 'none';
      document.querySelectorAll('.color-dot').forEach(d => d.onclick = function() {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        this.classList.add('selected');
        selColor = this.dataset.color;
      });
      document.querySelectorAll('.icon-option').forEach(i => i.onclick = function() {
        document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
        this.classList.add('selected');
        selIcon = this.dataset.icon;
      });
      document.getElementById('save-button-btn').onclick = () => {
        const t = document.getElementById('btn-text').value.trim();
        const u = document.getElementById('btn-url').value.trim();
        if (!t||!u) return toast('املأ الحقول', false);
        buttons.push({text:t, url:u, color:selColor, icon:selIcon});
        renderButtons();
        document.getElementById('button-form').style.display = 'none';
        document.getElementById('btn-text').value='';
        document.getElementById('btn-url').value='';
      };

      // معاينة
      function updatePreview() {
        document.getElementById('preview-text').innerHTML = document.getElementById('editor').innerHTML;
        document.getElementById('preview-buttons').innerHTML = buttons.map(b => 
          `<a href="${b.url}" target="_blank" style="background:${b.color}; color:white; padding:8px 15px; border-radius:8px; text-decoration:none; display:inline-block;">${b.icon} ${b.text}</a>`
        ).join('');
      }

      // نشر
      document.getElementById('publish-btn').onclick = async () => {
        const chatId = document.getElementById('channel-select').value;
        const text = document.getElementById('editor').innerHTML.trim();
        if (!chatId) return toast('اختر قناة', false);
        if (!text && mediaFiles.length === 0) return toast('لا يوجد محتوى', false);

        const markup = buttons.length ? { inline_keyboard: buttons.map(b => [{ text: b.icon + ' ' + b.text, url: b.url }]) } : undefined;

        try {
          if (mediaFiles.length > 0) {
            for (let i = 0; i < mediaFiles.length; i++) {
              const fd = new FormData();
              fd.append('chat_id', chatId);
              if (i === 0 && text) fd.append('caption', text);
              if (i === mediaFiles.length - 1 && markup) fd.append('reply_markup', JSON.stringify(markup));
              const method = mediaFiles[i].type.startsWith('image') ? 'sendPhoto' : 'sendVideo';
              fd.append(method === 'sendPhoto' ? 'photo' : 'video', mediaFiles[i]);
              await fetch(API + '/' + method, { method: 'POST', body: fd });
            }
            toast('✅ تم النشر مع الوسائط');
          } else {
            const payload = { chat_id: chatId, text, parse_mode: 'HTML' };
            if (markup) payload.reply_markup = markup;
            const res = await fetch(API + '/sendMessage', {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const d = await res.json();
            if (d.ok) toast('✅ تم النشر');
            else throw new Error(d.description);
          }
          // تنظيف
          document.getElementById('editor').innerHTML = '';
          buttons = [];
          renderButtons();
          mediaFiles = [];
          document.getElementById('media-previews').innerHTML = '';
          document.getElementById('channel-select').value='';
        } catch(e) { toast('❌ ' + e.message, false); }
      };

      // Dark Mode
      document.getElementById('dark-toggle').onclick = () => document.documentElement.classList.toggle('dark');

      // بدء
      renderChannels();
      updateSelect();
    })();
  </script>
</body>
</html>
